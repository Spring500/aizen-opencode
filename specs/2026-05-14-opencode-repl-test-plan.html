# opencode-repl 测试计划

**日期**：2026-05-14 · **版本**：v1.0 · **关联规范**：[opencode-repl 设计规范](./2026-05-14-opencode-repl-design.html)

## 0. 总览

本测试计划覆盖 opencode-repl 的三个测试层次：

:::mermaid
flowchart TD
  A[测试金字塔] --> B[Part 1: 单元测试]
  A --> C[Part 2: 集成测试]
  A --> D[Part 3: 人工验收]

  B --> B1[state.ts — 数据模型]
  B --> B2[format.ts — 输出格式化]
  B --> B3[slash.ts — 命令路由]
  B --> B4[prompt.ts — SSE 事件循环]
  B --> B5[client.ts — SDK 工厂]

  C --> C1[完整 REPL 周期]
  C --> C2[权限交互]
  C --> C3[SSE 断开恢复]
  C --> C4[Session 管理]
  C --> C5[错误处理]

  D --> D1[启动 & 连接]
  D --> D2[Session 管理]
  D --> D3[Prompt & 回复]
  D --> D4[权限审批]
  D --> D5[错误恢复]
:::

!!! Tip 测试框架
    所有自动化测试使用 `bun:test`（`describe`/`test`/`expect`），与其他 opencode 包保持一致。集成测试中 SDK 客户端使用 mock 实现，不依赖真实 `opencode serve` 进程。

---

## Part 1: 单元测试

### 1.1 state.ts — 数据模型 & 状态转换

**测试目标**：验证 session / config / multiline 数据结构的创建和状态合法性。

#### 1.1.1 session 初始化

| 测试用例 | 输入 | 期望输出 |
|----------|------|----------|
| 新建空 session | `createSession("ses_001", "测试")` | `{ id: "ses_001", title: "测试", files: [], approved: Set {} }` |
| 带 model 的 session | `createSession("ses_002", "标题", "openai/gpt-4o")` | `model` 字段为 `"openai/gpt-4o"` |
| 带附件列表 | `createSession("ses_003", "标题", undefined, ["a.ts","b.ts"])` | `files` 为 `["a.ts", "b.ts"]` |
| approved 默认空 Set | 任何新 session | `approved` 为 `Set {}`，`approved.has("rm")` → `false` |

#### 1.1.2 session 修改（不变量验证）

| 测试用例 | 操作 | 期望行为 |
|----------|------|----------|
| 切换 session 清空 approved + 更新 title | `switchSession(newId, newTitle)` | `session.approved.size` 变为 `0`，`session.id` 变为 `newId`，`session.title` 变为 `newTitle` |
| 设置模型 | `setModel("openai/gpt-4o")` | `session.model` 为 `"openai/gpt-4o"` |
| 新建 session 清空 files | `newSession("ses_new", "新标题")` | `session.files` 为 `[]` |
| Fork session 清空 approved | `forkSession("ses_fork", "fork标题")` | `session.approved.size` 为 `0` |
| 添加附件 | `addFile("src/foo.ts")` | `session.files` 包含 `"src/foo.ts"` |
| 重复附件去重 | `addFile("src/foo.ts")` 两次 | `session.files` 中 `"src/foo.ts"` 仅出现一次 |
| 清空附件 | `clearFiles()` | `session.files` 为 `[]` |
| 添加权限 pattern | `approvePattern("rm -rf dist/")` | `session.approved.has("rm -rf dist/")` → `true` |

#### 1.1.3 multiline 缓冲

| 测试用例 | 输入 | 期望输出 |
|----------|------|----------|
| 初始状态 | 新建 multiline buffer | `{ active: false, buffer: [] }` |
| 进入多行模式 | `startMultiline()` | `active: true, buffer: []` |
| 追加行 | `pushLine("第一行")` + `pushLine("第二行")` | `buffer: ["第一行", "第二行"]` |
| 结束多行 | `finishMultiline()` | 返回 `"第一行\n第二行"`，`active: false, buffer: []` |
| 空内容取消 | `startMultiline()` → `finishMultiline()`（buffer 为空） | 返回 `null` 表示取消 |
| 结束但无内容（仅换行） | `pushLine("")` → `finishMultiline()` | 返回 `"\n"`（至少含一个空行） |

#### 1.1.4 config 验证

| 测试用例 | 输入 | 期望输出 |
|----------|------|----------|
| CLI 默认值 | 无参数 | `serverUrl: "http://localhost:4096"`, `directory: process.cwd()` |
| 自定义 URL | `--url http://localhost:8080` | `serverUrl: "http://localhost:8080"` |
| 自定义目录 | `--dir /path/to/project` | `directory: "/path/to/project"` |
| --thinking 标志 | `--thinking` | `thinking: true` |
| --new 标志 | `--new` | `newSession: true` |
| --session 指定 | `--session ses_abc` | `initSession: "ses_abc"` |
| 无 --session 且非 --new | `initSession` 为空字符串 | 进入 connecting 时走自动发现逻辑 |

### 1.2 format.ts — 输出格式化

**测试目标**：验证所有终端输出格式化函数的输入 → 输出一致性。由于 picocolors 输出 ANSI 转义序列，测试应验证关键内容子串存在（不对 ANSI 码做精确匹配）。

#### 1.2.1 AI 回复渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 消息头部 | `formatAIHeader("assistant", "opencode", "claude-sonnet-4")` | `"AI"`, `"opencode"`, `"claude-sonnet-4"` |
| 消息头 agent 缺失 | `formatAIHeader("assistant", undefined, "claude-sonnet-4")` | 不打印 `"undefined"`，也不崩溃 |
| 消息头 modelID 缺失 | `formatAIHeader("assistant", "opencode", undefined)` | 不打印 `"undefined"`，也不崩溃 |
| 文本增量 | `formatTextDelta("你好世界")` | `"你好世界"` |
| 空文本增量 | `formatTextDelta("")` | 空字符串 |
| 多行文本增量（含换行） | `formatTextDelta("第一行\n第二行")` | `"第一行"`, `"第二行"` |

#### 1.2.2 工具调用渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| running 状态 | `formatToolCall("bash", "npm install", "running")` | `"bash"`, `"npm install"`（cyan 色） |
| completed 状态 | `formatToolCall("read", "src/index.ts", "completed")` | `"read"`, `"src/index.ts"`, `"✓"`（green） |
| completed 带 output | `formatToolCall("grep", "search 'foo'", "completed","match found")` | `"match found"`（dim） |
| error 状态 | `formatToolCall("write", "config.json", "error", "EACCES")` | `"write"`, `"config.json"`, `"✗"`, `"EACCES"`（red） |
| undefined state（畸形事件） | `formatToolCall("bash", "cmd", undefined)` | 不抛出异常，输出不崩溃 |

#### 1.2.3 thinking / reasoning 渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| thinking 启用时 | `formatReasoning("我需要先读取文件...")` | `"我需要先读取文件..."`（dim italic） |
| thinking 禁用时 | `formatReasoning("...")` 在 `thinking: false` 环境 | 空字符串 |

#### 1.2.4 提示符 & 分隔线

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| idle 提示符 | `formatPrompt("idle")` | `">"`（green） |
| 权限提示符 | `formatPermissionPrompt("bash(rm -rf dist/)")` | `"⚠"`, `"bash(rm -rf dist/)"`, `"[y=本次 / n=拒绝 / a=始终允许]"` |
| 分隔线 | `formatSeparator("最近 10 条消息")` | `"────"`, `"最近 10 条消息"` |

#### 1.2.5 /history 渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 空历史 | `formatHistory([], 10)` | `"最近 0 条消息"` 或 `"无历史"` |
| 单条 user 消息 | `formatHistory([{role:"user", text:"hello"}])` | `"You:"`, `"hello"` |
| 单条 assistant 消息 | `formatHistory([{role:"assistant", text:"hi"}])` | `"AI:"`, `"hi"` |
| 混合消息 | user + assistant 两条 | `"You:"`, `"hello"`, `"AI:"`, `"hi"`，顺序正确 |
| 截断 | `formatHistory(messages(20条), 5)` | 仅显示最新 5 条 |
| 长消息截断 | 130 字符的消息 | 显示前 117 字符 + `"..."`，内部换行保留 |

#### 1.2.6 /sessions 渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 空列表 | `formatSessions([])` | `"无 session"` 或类似提示 |
| 单条 | `formatSessions([{id:"ses_1",title:"测试",updated:"11:18"}])` | `"ses_1"`, `"测试"`, `"11:18"` |
| 多条 | 3 条 session | 3 行数据，表头 `"Session ID"`, `"Title"`, `"Updated"` |
| ID 截断 | 长 ID `ses_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx` | 显示前 17 字符 + `...` |
| 标题截断 | `formatSessions([{id:"ses_1", title:"此会话标题非常非常长超过二十五个中文字符", updated:"11:18"}])` | 标题显示前 22 字符 + `...`，表格对齐不破坏 |

#### 1.2.7 /info 渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 完整信息 | `formatInfo({id:"ses_1", title:"测试", directory:"/a", model:"openai/gpt-4o", files:["a.ts"]})` | `"Title"`, `"测试"`, `"ID"`, `"ses_1"`, `"Directory"`, `"/a"`, `"Model"`, `"openai/gpt-4o"`, `"Files"`, `"1"` |
| 无 model | model 为空 | 不显示 `"Model"` 行或显示 `"默认"` |
| 无附件 | files 为空 | `"Files"` 行显示 `"0"` |

#### 1.2.8 /files 渲染

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 空附件 | `formatFiles([])` | `"无附件"` |
| 单附件 | `formatFiles(["src/index.ts"])` | `"1. src/index.ts"` |
| 多附件 | `formatFiles(["a.ts", "b.ts", "c.ts"])` | `"1. a.ts"`, `"2. b.ts"`, `"3. c.ts"` |

#### 1.2.9 连接状态消息

| 测试用例 | 输入 | 期望输出包含 |
|----------|------|--------------|
| 连接中 | `formatConnecting("http://localhost:4096")` | `"正在连接"`, `"http://localhost:4096"` |
| 连接成功 | `formatConnected("ses_xxx", "调研 OpenCode")` | `"已连接"`, `"ses_xxx"`, `"调研 OpenCode"` |
| 连接失败 | `formatConnectionError("ECONNREFUSED")` | `"无法连接"`, `"ECONNREFUSED"` |

| 创建 session 失败 | `formatSessionCreateError("权限不足")` | `"无法创建"`, `"权限不足"` |

### 1.4 prompt.ts — SSE 事件循环

**测试目标**：验证事件分派逻辑、状态转换、权限自动审批、错误处理。

#### 1.4.1 事件分派

| 测试用例 | 输入事件 | 期望行为 |
|----------|----------|----------|
| `message.updated` 首次 | `{ role: "assistant", agent: "opencode", modelID: "claude-sonnet-4" }` | 调用 `formatAIHeader` 输出头部 |
| `message.updated` 重复 | 同角色再次收到 | 不重复打印头部 |
| `text` part | `{ type: "text", text: "你好" }` | `process.stdout.write("你好")` |
| `tool` running | `{ type: "tool", state: "running", tool: "bash", title: "npm install" }` | 调用 `formatToolCall("bash", "npm install", "running")` |
| `tool` completed | `{ type: "tool", state: "completed", ... }` | 调用 `formatToolCall(..., "completed")` |
| `tool` error | `{ type: "tool", state: "error", error: "permission denied" }` | 调用 `formatToolCall(..., "error", "permission denied")` |
| `reasoning` (thinking=true) | `{ type: "reasoning", text: "分析中..." }` | 调用 `formatReasoning` |
| `reasoning` (thinking=false) | `{ type: "reasoning", text: "分析中..." }` | 静默忽略 |
| `step-start` | `{ type: "step-start" }` | 静默忽略 |
| `step-finish` | `{ type: "step-finish" }` | 静默忽略 |
| `session.error` | `{ error: "超出速率限制" }` | 打印红色错误，继续循环 |
| `session.status` idle | `{ type: "idle" }` | 退出事件循环 → idle 状态 |
| `question.asked` | `{ type:"question.asked", id:"q1", question:"如何继续?" }` | 暂停流，展示问题，等待用户文本输入后回复 |
| `tool` completed 先于 running | 同一 toolID 先收到 completed 再 running | 不崩溃，completed 正常渲染，running 随后更新 |
| 未知事件类型 | `{ type: "unknown_xxx" }` | 静默忽略 |
| SSE 事件无 type 字段 | `{ }` | 静默忽略，不抛出异常 |

#### 1.4.2 权限处理（prompt.ts 内部逻辑）

| 测试用例 | 输入场景 | 期望行为 |
|----------|----------|----------|
| 权限自动通过 | `permission.asked` 的 pattern 在 `session.approved` 中 | 自动调用 `reply("always")`，不进入 await_perm |
| 权限需要确认 | `permission.asked` 的 pattern 不在 approved 中 | 暂停流，进入 await_perm 状态 |
| 空 patterns 数组 | `permission.asked { patterns: [] }` | 进入 await_perm（安全降级），不崩溃 |
| 权限包含多 pattern | `patterns: ["rm -rf dist/", "mv * /tmp/"]` 其中一个在 approved | 应全部不在 approved 才触发确认（取决于实现策略） |

#### 1.4.3 question.asked 处理

| 测试用例 | 输入场景 | 期望行为 |
|----------|----------|----------|
| AI 提问 | `question.asked { id: "q1", question: "使用哪个端口?" }` | 暂停流，展示问题，接受用户输入后 `POST /question/q1/reply` |
| 用户回复空字符串 | 对 question 回复 `""` | 允许发送空回复（取决于需求，或要求非空） |

#### 1.4.4 abort 处理

| 测试用例 | 输入 | 期望行为 |
|----------|------|----------|
| streaming 中 abort | 接收 Ctrl+C 信号 | 调用 `POST /session/:id/abort`，打印 `"已中断"`，→ idle |
| await_perm 中 abort | 接收 Ctrl+C 信号 | 调用 `POST /session/:id/abort`，打印 `"已中断"`，→ idle |
| abort 请求失败 | abort API 返回错误 | 仍然 → idle，打印警告 |

### 1.5 client.ts — SDK 工厂

**测试目标**：验证 SDK 客户端创建和 API 调用封装。

#### 1.5.1 客户端创建

| 测试用例 | 输入 | 期望行为 |

| 正常创建 | `createOpencodeClient({ baseUrl: "http://localhost:4096", directory: "/tmp" })` | 返回客户端实例，非 null |

| `getSession("ses_1")` | `client.getSession(...)` | `GET /session/ses_1` |
| `createSession({ title: "新" })` | `client.createSession(...)` | `POST /session` body `{ title: "新" }` |
| `sendMessage(sid, { parts, model })` | `client.sendMessage(...)` | `POST /session/ses_1/message` |
| `sendCommand(sid, "review")` | `client.sendCommand(...)` | `POST /session/ses_1/command` body `{command:"review"}` |
| `replyPermission("req1", "once")` | `client.replyPermission(...)` | `POST /permission/req1/reply` body `{reply:"once"}` |
| `replyPermission("req1", "always")` | `client.replyPermission(...)` | `POST /permission/req1/reply` body `{reply:"always"}` |
| `replyPermission("req1", "reject")` | `client.replyPermission(...)` | `POST /permission/req1/reply` body `{reply:"reject"}` |
| `abortSession("ses_1")` | `client.abortSession(...)` | `POST /session/ses_1/abort` |
| `forkSession("ses_1", "msg_1")` | `client.forkSession(...)` | `POST /session/ses_1/fork` body `{messageID:"msg_1"}` |
| `getMessages("ses_1", 10)` | `client.getMessages(...)` | `GET /session/ses_1/message?limit=10` |
| `replyQuestion("q1", { answer: "8080" })` | `client.replyQuestion(...)` | `POST /question/q1/reply` body `{answer:"8080"}` |
| `subscribe()` | `client.subscribe()` | 返回 AsyncGenerator，可迭代消费 SSE 事件 |

#### 1.5.3 错误传播

| 测试用例 | 模拟场景 | 期望行为 |
|----------|----------|----------|
| 网络错误 | fetch 返回 `ECONNREFUSED` | 将错误传播给调用方，不静默吞掉 |
| HTTP 4xx | 服务端返回 404 | 将错误传播，包含状态码 |
| HTTP 5xx | 服务端返回 500 | 将错误传播，包含状态码 |

## Part 2: 集成测试

集成测试使用 **mock SDK 客户端**，所有 HTTP 调用替换为可控的 mock 实现，专注验证模块间交互逻辑和状态转换。

### 2.1 测试基础设施

```typescript
// 测试中使用的最小 mock
interface MockSDK {
  event: {
    subscribe:    () => AsyncGenerator<SSEEvent>
  }
  session: {
    prompt:     (sid: string, body: any) => Promise<any>
    command:    (sid: string, body: any) => Promise<any>
    get:        (sid: string) => Promise<any>
    list:       (params: any) => Promise<any>
    create:     (body: any) => Promise<any>
    fork:       (sid: string, body: any) => Promise<any>
    messages:   (sid: string, limit: number) => Promise<any>
    abort:      (sid: string) => Promise<any>
  }
  permission: {
    reply:      (rid: string, body: any) => Promise<any>
  }
  question: {
    reply:      (qid: string, body: any) => Promise<any>
  }
}
```

!!! Tip mock 粒度
    mock SDK 不模拟网络层细节。每个 SDK 方法直接返回可控值（同步或异步），让测试专注于 repl.ts 主循环的状态转换和事件消费逻辑。

### 场景 1: 完整 REPL 周期（idle → streaming → idle）

**前置条件**：config 已初始化，session 已存在（id=`ses_001`），mock SDK 就绪。

| 步骤 | 操作 | mock 行为 | 期望结果 |
|------|------|-----------|----------|
| 1 | REPL 启动，进入 idle | — | 提示符 `> ` 显示 |
| 2 | 输入 `"帮我重构此代码"` 回车 | `sendMessage` 返回 `{ ok: true, stream: generator }`；generator 依次 yield 多个 SSE 事件 | 进入 streaming 状态 |
| 3 | 流式事件 `message.updated` | yield `{ type:"message.updated", role:"assistant", agent:"opencode", modelID:"claude-sonnet-4" }` | 终端打印 `AI · opencode · claude-sonnet-4` |
| 4 | 流式事件 `text` | yield `{ type:"message.part.updated", part:{ type:"text", text:"好的，我来分析..." } }` | 终端增量打印文本 |
| 5 | 流式事件 `tool running` | yield `{ type:"message.part.updated", part:{ type:"tool", state:"running", tool:"bash", title:"npm install" } }` | 打印 `⚙ bash · npm install` (cyan) |
| 6 | 流式事件 `tool completed` | yield `{ type:"message.part.updated", part:{ type:"tool", state:"completed", tool:"bash", title:"npm install", output:"done" } }` | 打印 `⚙ bash · npm install ✓` (green) + dim 输出 |
| 7 | 流式事件 `session.status idle` | yield `{ type:"session.status", status:"idle" }` | 退出 streaming，显示提示符 `> ` |
| 8 | 状态重回 idle | — | 可以接受下一个 prompt 输入 |

**验证点**：
- 提示符在 streaming 期间不显示
- 事件顺序正确处理（header → text → tool → idle）
- 中间状态不包括 idle 提示符闪现

---

### 场景 2: 权限审批流程（streaming → await_perm → streaming → idle）

**前置条件**：session.approved 为空。

| 步骤 | 操作 | mock 行为 | 期望结果 |
|------|------|-----------|----------|
| 1 | idle 发送 prompt | mock 返回流生成器 | 进入 streaming |
| 2 | 收到 `permission.asked` | yield `{ type:"permission.asked", id:"req_1", permission:"bash", patterns:["rm -rf dist/"] }` | 打印 `⚠ 请求授权: bash(rm -rf dist/)` + 提示符 `⚠ 批准？ [y=本次 / n=拒绝 / a=始终允许] >` |
| 3 | 用户输入 `y` | `replyPermission("req_1", { reply:"once" })` 返回 ok | 退出 await_perm，恢复 streaming |
| 4 | 后续文本继续 | yield 更多 text 事件 | 正常输出 |
| 5 | 最终 idle | yield `session.status.idle` | 回到 idle |

**验证点**：
- await_perm 期间后续流事件被阻塞（暂停消费）
- 用户回复后流恢复
- `reply: "once"` 正确发送
- session.approved 不变（once 不加入 pattern）

---

### 场景 3: 自动审批（pattern 已在 approved 中）

**前置条件**：`session.approved = new Set(["rm -rf dist/"])`。

| 步骤 | 操作 | mock 行为 | 期望结果 |
|------|------|-----------|----------|
| 1 | idle 发送 prompt | mock 返回流生成器 | 进入 streaming |
| 2 | 收到 `permission.asked` pattern 在 approved | yield `{ type:"permission.asked", id:"req_2", permission:"bash", patterns:["rm -rf dist/"] }` | 自动调用 `replyPermission("req_2", { reply:"always" })` |
| 3 | 不暂停流 | — | 不进入 await_perm，流式输出继续 |
| 4 | 最终 idle | yield `session.status.idle` | 回到 idle |

**验证点**：
- 无任何 await_perm 提示符出现
- `reply: "always"` 正确发送
- 流式输出不中断

### 场景 4: SSE 连接在 streaming 中断开

**前置条件**：正在 streaming 中。

| 步骤 | 操作 | mock 行为 | 期望结果 |
|------|------|-----------|----------|
| 1 | streaming 进行中 | 流式事件正常 yield | 文本在输出 |
| 2 | 连接断开 | generator throw `SSEError("connection lost")` | 打印 `⚠ 连接中断` |
| 3 | 状态恢复 | — | 回到 idle 状态，显示提示符 `> ` |

**验证点**：
- 错误信息明确提示连接中断
- 不崩溃，不退进程
- 用户可以立即发送新 prompt 续接

| 1 | 收到 permission.asked | — | 进入 await_perm，等待用户输入 |
| 2 | 连接断开 | 底层 SSE 连接断开 | 打印 `⚠ 连接中断，权限请求可能已被拒绝` |
| 3 | 状态恢复 | — | 回到 idle 状态 |

**验证点**：
- 明确提示"权限请求可能已被拒绝"

- [ ] **F-04** 输入 `/clear-files`，验证 `/files` 显示 `"无附件"`

### 3.8 错误恢复

- [ ] **E-01** streaming 期间断掉 serve（`kill` serve 进程），验证打印 `⚠ 连接中断`，回到 `> ` 提示符
- [ ] **E-02** 断连后重新启动 serve，输入新 prompt，验证正常连接和工作
- [ ] **E-03** await_perm 期间断掉 serve，验证打印 `⚠ 连接中断，权限请求可能已被拒绝`，回到 idle
- [ ] **E-04** streaming 期间按一次 Ctrl+C，验证 abort → `"已中断"` → idle，可继续输入
- [ ] **E-05** idle 状态下按 Ctrl+C，验证正常退出程序（退出码 0）
- [ ] **E-06** streaming 期间快速按两次 Ctrl+C，验证直接退出程序
- [ ] **E-07** 输入 `/quit` 或 `/exit`，验证正常退出（退出码 0）
- [ ] **E-08** 透传命令 `/review` 发送后 serve 返回错误（如 400），验证打印错误并保持 idle

### 3.9 边界情况

- [ ] **B-01** 发送非常长的 prompt（如粘贴 5000 字符），验证正确发送和接收
- [ ] **B-02** 发送含特殊字符的 prompt（`\n`、`\t`、Unicode emoji 等），验证正确显示
- [ ] **B-03** Session 标题包含特殊字符（中文、emoji），验证 `/sessions` 和 `/info` 正确显示
- [ ] **B-04** 连续快速发送多个 prompt（上一个完成后立即输入下一个），验证无竞态、无卡死
- [ ] **B-05** 终端窗口调整大小时，验证显示不混乱
- [ ] **B-06** 管道输入（`echo "你好" | opencode-repl`），验证行为合理（拒绝或正常处理）
- [ ] **B-07** 验证 `--help` / `-h` 输出帮助信息
- [ ] **B-08** 验证 `--version` / `-v` 输出版本号
